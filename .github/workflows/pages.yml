name: Build and deploy Quarto site to docs

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup-quarto@v2

      - name: Render book
        run: quarto render code/Intro

      - name: Copy to docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r code/Intro/_book/* docs/ || true
          touch docs/.nojekyll

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build site via Actions — ${{ github.sha }}"
            git push origin HEAD:main
          fi
