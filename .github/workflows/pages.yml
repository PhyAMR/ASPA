name: Build and deploy Quarto site to docs

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install Quarto
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 libglib2.0-0 libgconf-2-4
          wget -qO quarto.deb https://github.com/quarto-dev/quarto-cli/releases/latest/download/quarto-linux-amd64.deb
          sudo dpkg -i quarto.deb || sudo apt-get -f install -y
          rm -f quarto.deb

      - name: Render book
        run: quarto render code/Intro

      - name: Copy to docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r code/Intro/_book/* docs/ || true
          touch docs/.nojekyll

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build site via Actions — ${{ github.sha }}"
            git push origin HEAD:main
          fi
